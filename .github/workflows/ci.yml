name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: ⚡ Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: 📦 Install Dependencies
        run: |
          uv sync --frozen
          uv pip check

      - name: 🔍 Syntax Check
        run: |
          python -m py_compile src/urbanplan/agent.py
          python -m py_compile src/urbanplan/supervisor/supervisor.py
          python -m py_compile src/urbanplan/agents/estimador.py
          python -m py_compile src/urbanplan/agents/normativo.py

  deploy:
    needs: test-and-lint
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐳 Build Docker Image
        run: |
          docker build -t gcr.io/mlops-entrega/urbanplan-agent:latest .
          echo "Docker image built successfully"

      - name: ☁️ Deploy to Google Cloud Run (Simulated)
        run: |
          echo "Simulating deployment to GCP..."
          echo "gcloud run deploy urbanplan-agent --image gcr.io/mlops-entrega/urbanplan-agent:latest --region europe-west1"
          echo "✅ CD Pipeline completed. Agent deployed!"
